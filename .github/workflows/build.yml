name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pypdf

      - name: Build EXE
        run: pyinstaller --onefile split_oversized_pdf_pages.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: pdf-splitter-windows
          path: dist/split_oversized_pdf_pages.exe
